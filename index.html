<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Aulas - TPF 43M</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .card {
            background-color: #1e1e1e;
            border-left: 5px solid #4caf50;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card.past { border-left-color: #888; opacity: 0.8; }
        .card.today { border-left-color: #e91e63; background-color: #2a1b20; transform: scale(1.02); }
        .card.next { border-left-color: #2196f3; }
        
        .status {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .past .status { color: #aaaaaa; }
        .today .status { color: #ff4081; }
        .next .status { color: #64b5f6; }

        .date { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .details { font-size: 1em; color: #cccccc; line-height: 1.5; }
        .highlight { font-weight: bold; color: #ffffff; }
    </style>
</head>
<body>

    <h1>Cronograma TPF 43M</h1>
    <div class="container" id="painel">
        </div>

    <script>
        // Array com os dados extraídos da sua planilha
        // Você pode adicionar o resto das aulas seguindo este mesmo formato
        const aulas = [
            { data: '2026-02-11', uc: 'UC13 - Elaborar portfólio fotográfico', docente: 'Marcella Camillo', aula: '4' },
            { data: '2026-02-12', uc: 'UC13 - Elaborar portfólio fotográfico', docente: 'Marcella Camillo', aula: '5' },
            { data: '2026-02-19', uc: 'UC11 - Paisagem, Arquitetura e Interiores', docente: 'Paula Lira', aula: '1' },
            { data: '2026-02-23', uc: 'UC10 - Propaganda e Publicidade', docente: 'Guilherme Correia', aula: '1' },
            { data: '2026-02-24', uc: 'UC13 - Elaborar portfólio fotográfico', docente: 'Barbara Milano', aula: '6' },
            { data: '2026-02-25', uc: 'UC10 - Propaganda e Publicidade', docente: 'Guilherme Correia', aula: '2' },
            { data: '2026-02-26', uc: 'UC11 - Paisagem, Arquitetura e Interiores', docente: 'Paula Lira', aula: '2' }
        ];

        function formatarDataBR(dataISO) {
            const [ano, mes, dia] = dataISO.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function renderizar() {
            // Pega a data de hoje no formato YYYY-MM-DD (ajustando para fuso horário local)
            const hoje = new Date();
            const offset = hoje.getTimezoneOffset() * 60000;
            const dataHojeStr = (new Date(hoje - offset)).toISOString().split('T')[0];

            let ultimaAula = null;
            let aulaHoje = null;
            let proximaAula = null;

            // Ordena o array por data para garantir a cronologia
            aulas.sort((a, b) => a.data.localeCompare(b.data));

            for (let aula of aulas) {
                if (aula.data < dataHojeStr) {
                    ultimaAula = aula; // Vai sobrescrevendo até achar a última do passado
                } else if (aula.data === dataHojeStr) {
                    aulaHoje = aula;
                } else if (aula.data > dataHojeStr && !proximaAula) {
                    proximaAula = aula; // Pega apenas a primeira do futuro
                }
            }

            const painel = document.getElementById('painel');
            let html = '';

            if (ultimaAula) {
                html += `
                <div class="card past">
                    <div class="status">Última Aula</div>
                    <div class="date">${formatarDataBR(ultimaAula.data)}</div>
                    <div class="details">
                        <span class="highlight">${ultimaAula.uc}</span><br>
                        Docente: ${ultimaAula.docente} | Aula ${ultimaAula.aula}
                    </div>
                </div>`;
            }

            if (aulaHoje) {
                html += `
                <div class="card today">
                    <div class="status">🔥 Hoje</div>
                    <div class="date">${formatarDataBR(aulaHoje.data)}</div>
                    <div class="details">
                        <span class="highlight">${aulaHoje.uc}</span><br>
                        Docente: ${aulaHoje.docente} | Aula ${aulaHoje.aula}
                    </div>
                </div>`;
            } else {
                html += `
                <div class="card today" style="background-color: #1e1e1e; border-color: #444;">
                    <div class="status" style="color: #aaa;">Hoje</div>
                    <div class="details">Sem aulas programadas para hoje. Aproveite o descanso (ou vá editar fotos)!</div>
                </div>`;
            }

            if (proximaAula) {
                html += `
                <div class="card next">
                    <div class="status">Próxima Aula</div>
                    <div class="date">${formatarDataBR(proximaAula.data)}</div>
                    <div class="details">
                        <span class="highlight">${proximaAula.uc}</span><br>
                        Docente: ${proximaAula.docente} | Aula ${proximaAula.aula}
                    </div>
                </div>`;
            }

            painel.innerHTML = html;
        }

        renderizar();
    </script>
</body>
</html>
